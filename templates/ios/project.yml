name: App
options:
  bundleIdPrefix: dev.reimei
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  App:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.reimei.App
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: App
        UILaunchScreen: {}
  AppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.reimei.AppTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  App:
    build:
      targets:
        App: all
        AppTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - AppTests
